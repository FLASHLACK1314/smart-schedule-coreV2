# 开发环境配置示例
# 复制此文件为 application-dev.yaml 并修改为实际配置
server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/smart-schedule-core
    username: smart-schedule-core
    password: 123456
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      timeout: 5000ms  # 连接超时时间
      lettuce:
        pool:
          max-active: 8      # 最大连接数
          max-wait: -1ms     # 最大等待时间（-1表示无限等待）
          max-idle: 8        # 最大空闲连接数
          min-idle: 0        # 最小空闲连接数
        shutdown-timeout: 100ms  # 关闭超时时间
  jackson:
    property-naming-strategy: SNAKE_CASE

  # MCP Server 配置
  ai:
    mcp:
      server:
        enabled: true
        name: smart-schedule-mcp-server
        version: 1.0.0
        type: sync
        instructions: "智能排课系统 MCP 服务，提供排课冲突查询、教师课表查询、教室占用查询等功能"
        sse-endpoint: /mcp/sse
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: true

# Dify 智能调课助手配置
dify:
  base-url: http://your-dify-server/v1
  api-key: ${DIFY_API_KEY:your-api-key-here}
  connect-timeout: 5000     # 连接超时 5秒
  read-timeout: 60000       # 读取超时 60秒（流式模式下此配置不太重要）
  write-timeout: 30000      # 写入超时 30秒

# ⚠️ 警告：数据库自动初始化配置（仅开发环境使用）
# enabled: true 时会检查并初始化数据库表，生产环境必须设置为 false！
database:
  init:
    enabled: true
    mode: full                      # 初始化模式: full(满数据) | demo(演示数据) | minimal(最小数据)
    drop-and-create: true          # 是否强制删除所有表重建（慎用！）
    drop-all-on-missing: true       # 缺失表时是否删除所有表重建
    fail-fast: true                 # 初始化失败时是否终止应用启动
    # tables 和 sqlFiles 可选配置，不填则使用默认的表依赖顺序
